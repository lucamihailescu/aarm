services:
  app:
    image: denoland/deno:latest
    command: >
      sh -c "deno run -A npm:prisma@^5.20.0 db push && deno run -A npm:prisma@^5.20.0 generate && deno run -A server.ts"
    environment:
      DATABASE_URL: postgresql://aarm:aarm_password@postgres:5432/aarm_policies?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: aarm
      POSTGRES_PASSWORD: aarm_password
      POSTGRES_DB: aarm_policies
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - aarm_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  aarm_pg_data:
